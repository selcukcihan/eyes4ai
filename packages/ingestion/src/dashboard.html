<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eyes4ai</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eaeaea; min-height: 100vh; }
  .container { max-width: 740px; margin: 0 auto; padding: 40px 20px; }
  header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  h1 { font-size: 1.4rem; font-weight: 600; color: #fff; }
  .logo { width: 28px; height: 28px; }
  .period { color: #aaa; font-size: 0.85rem; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .card { background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 18px 20px; }
  .card .label { color: #bbb; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .card .value { font-size: 1.6rem; font-weight: 700; color: #fff; }
  .card .sub { color: #999; font-size: 0.78rem; margin-top: 5px; }
  .chart-section { background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 20px; margin-bottom: 28px; }
  .chart-title { color: #bbb; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }
  .chart { display: flex; align-items: flex-end; gap: 3px; height: 140px; padding-bottom: 24px; position: relative; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; max-width: 32px; min-width: 6px; background: linear-gradient(180deg, #e2b714, #c49000); border-radius: 3px 3px 0 0; transition: height 0.3s; }
  .bar-col:hover .bar { background: linear-gradient(180deg, #f0cc3a, #d4a800); }
  .bar-date { position: absolute; bottom: -20px; color: #888; font-size: 0.65rem; white-space: nowrap; }
  .bar-tooltip { display: none; position: absolute; top: -22px; background: #2a2a4a; color: #fff; font-size: 0.7rem; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .bar-col:hover .bar-tooltip { display: block; }
  .trend-row { background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 16px 20px; margin-bottom: 28px; color: #ccc; font-size: 0.85rem; display: flex; gap: 24px; flex-wrap: wrap; }
  .trend-item { display: flex; flex-direction: column; gap: 2px; }
  .trend-label { color: #999; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .trend-val { font-weight: 600; }
  .trend-val.up { color: #4ade80; }
  .trend-val.down { color: #f87171; }
  .trend-val.neutral { color: #999; }
  .share-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; text-decoration: none; cursor: pointer; border: none; transition: background 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-x { background: #fff; color: #000; }
  .btn-x:hover { background: #e0e0e0; }
  .btn-copy { background: #2a2a4a; color: #eaeaea; }
  .btn-copy:hover { background: #3a3a5a; }
  .days-row { display: flex; gap: 6px; margin-bottom: 28px; }
  .days-btn { padding: 6px 16px; border-radius: 6px; border: 1px solid #2a2a4a; background: transparent; color: #999; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .days-btn:hover { border-color: #e2b714; color: #e2b714; }
  .days-btn.active { background: #e2b714; color: #1a1a2e; border-color: #e2b714; font-weight: 600; }
  .loading { color: #888; text-align: center; padding: 80px 0; font-size: 0.9rem; }
  .empty { color: #888; text-align: center; padding: 40px 0; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <svg class="logo" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M256 140c-120 0-200 90-210 116 10 26 90 116 210 116s200-90 210-116c-10-26-90-116-210-116z" fill="#e2b714"/>
      <circle cx="256" cy="256" r="64" fill="#1a1a2e"/>
      <circle cx="242" cy="242" r="14" fill="#fff"/>
    </svg>
    <h1>eyes4ai</h1>
  </header>
  <div class="period" id="period">loading...</div>

  <div class="days-row" id="days-row">
    <button class="days-btn" data-days="7">7 days</button>
    <button class="days-btn" data-days="14">14 days</button>
    <button class="days-btn" data-days="30">30 days</button>
  </div>

  <div id="content" class="loading">Loading report data...</div>
</div>

<script>
let currentDays = 7;
let currentReport = null;

function pct(n) { return n == null ? '—' : Math.round(n * 100) + '%'; }
function money(n) { return n == null ? '—' : '$' + n.toFixed(2); }

async function loadReport(days) {
  currentDays = days;
  document.querySelectorAll('.days-btn').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.days) === days);
  });

  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading...</div>';

  try {
    const res = await fetch('/api/report?days=' + days);
    const report = await res.json();
    currentReport = report;
    render(report);
  } catch (e) {
    content.innerHTML = '<div class="loading">Failed to load report data.</div>';
  }
}

function render(report) {
  const c = report.current;
  const p = report.previous;
  document.getElementById('period').textContent = c.startDate + '  →  ' + c.endDate;

  const tools = Object.keys(c.byTool).sort();
  const multiTool = tools.length > 1;

  let html = '';

  if (c.sessions === 0 && c.totalCommits === 0) {
    html += '<div class="empty">No activity recorded yet. Use Codex or Claude Code and make some commits.</div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  html += '<div class="grid">';
  html += card('Sessions', c.sessions, multiTool ? tools.map(t => c.byTool[t].sessions + ' ' + t).join(' · ') : '');
  html += card('Turns', c.turns, multiTool ? tools.map(t => c.byTool[t].turns + ' ' + t).join(' · ') : '');
  html += card('Active Days', c.activeDays + ' / ' + c.days, '');
  html += card('Estimated Cost', money(c.estimatedCost), multiTool ? tools.map(t => money(c.byTool[t].estimatedCost) + ' ' + t).join(' · ') : '');
  html += card('AI Commits', c.aiLinkedCommits + ' / ' + c.totalCommits, c.aiCommitPct != null ? pct(c.aiCommitPct) + ' of all commits' : '');
  html += card('AI Lines', c.aiLinesChanged.toLocaleString() + ' / ' + c.totalLinesChanged.toLocaleString(), c.aiLinesPct != null ? pct(c.aiLinesPct) + ' of lines changed' : '');
  html += card('Cost / Commit', money(c.avgCostPerCommit), '');
  html += '</div>';

  // Trend
  if (p && (p.sessions > 0 || p.totalCommits > 0)) {
    const costDir = c.estimatedCost > p.estimatedCost ? 'up' : c.estimatedCost < p.estimatedCost ? 'down' : 'neutral';
    const commitDir = (c.aiCommitPct || 0) > (p.aiCommitPct || 0) ? 'up' : (c.aiCommitPct || 0) < (p.aiCommitPct || 0) ? 'down' : 'neutral';
    html += '<div class="trend-row">';
    html += trendItem('Previous cost', money(p.estimatedCost) + ' → ' + money(c.estimatedCost), costDir);
    html += trendItem('Previous AI commits', pct(p.aiCommitPct) + ' → ' + pct(c.aiCommitPct), commitDir);
    html += '</div>';
  }

  // Activity chart
  if (report.dailyActivity && report.dailyActivity.length > 0) {
    // Fill in missing days so the chart isn't misleading
    const filled = fillDays(report.dailyActivity, c.startDate, c.endDate);
    const maxTurns = Math.max(...filled.map(d => d.turns), 1);

    html += '<div class="chart-section"><div class="chart-title">Daily turns</div><div class="chart">';
    for (let i = 0; i < filled.length; i++) {
      const day = filled[i];
      const h = day.turns === 0 ? 0 : Math.max(3, (day.turns / maxTurns) * 100);
      const showLabel = filled.length <= 14 || i % Math.ceil(filled.length / 10) === 0 || i === filled.length - 1;
      html += '<div class="bar-col">';
      html += '<div class="bar-tooltip">' + day.turns + ' turns</div>';
      if (day.turns > 0) html += '<div class="bar" style="height:' + h + '%"></div>';
      if (showLabel) html += '<div class="bar-date">' + day.date.slice(5) + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Share
  html += '<div class="share-row">';
  html += '<button class="btn btn-x" onclick="shareOnX()">Share on 𝕏</button>';
  html += '<button class="btn btn-copy" onclick="copyStats()">Copy stats</button>';
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function card(label, value, sub) {
  return '<div class="card"><div class="label">' + label + '</div><div class="value">' + value + '</div>' + (sub ? '<div class="sub">' + sub + '</div>' : '') + '</div>';
}

function trendItem(label, value, dir) {
  return '<div class="trend-item"><div class="trend-label">' + label + '</div><div class="trend-val ' + dir + '">' + value + '</div></div>';
}

function fillDays(activity, startDate, endDate) {
  const map = {};
  for (const d of activity) map[d.date] = d.turns;
  const result = [];
  const cur = new Date(startDate + 'T00:00:00');
  const end = new Date(endDate + 'T00:00:00');
  while (cur <= end) {
    const key = cur.toISOString().slice(0, 10);
    result.push({ date: key, turns: map[key] || 0 });
    cur.setDate(cur.getDate() + 1);
  }
  return result;
}

function buildShareText() {
  if (!currentReport) return '';
  const c = currentReport.current;
  let text = 'My AI coding stats (last ' + c.days + ' days):\n';
  text += c.sessions + ' sessions, ' + c.turns + ' turns\n';
  text += money(c.estimatedCost) + ' estimated cost\n';
  if (c.aiCommitPct != null) {
    text += pct(c.aiCommitPct) + ' of commits AI-linked\n';
  }
  if (c.aiLinesPct != null) {
    text += pct(c.aiLinesPct) + ' of lines from AI sessions\n';
  }
  text += '\nTracked with @eyes4ai — https://github.com/selcukcihan/eyes4ai';
  return text;
}

function shareOnX() {
  const text = buildShareText();
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

function copyStats() {
  const text = buildShareText();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy stats'; }, 2000);
  });
}

document.querySelectorAll('.days-btn').forEach(btn => {
  btn.addEventListener('click', () => loadReport(Number(btn.dataset.days)));
});

loadReport(7);
</script>
</body>
</html>
